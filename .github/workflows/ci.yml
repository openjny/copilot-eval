name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --locked --python 3.13 --group dev

      - name: Show Python version
        run: uv run python --version

      - name: Lint (ruff)
        run: uv run ruff check eval tests

      - name: Format check (ruff)
        run: uv run ruff format --check eval tests

      - name: Type check (mypy)
        run: uv run mypy

      - name: Test (pytest)
        run: uv run pytest

  security:
    name: Dependency and secret scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Export locked dependencies
        run: uv export --format requirements-txt --no-emit-project --all-groups --no-hashes --locked -o requirements.txt

      - name: Audit dependencies (pip-audit)
        run: uvx pip-audit -r requirements.txt --no-deps

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
