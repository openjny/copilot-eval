vars:
  resource_group: rg-copilot-eval
  location: southeastasia

runner:
  epochs: 1
  timeout_seconds: 300
  model: claude-sonnet-4
  max_turns: 20
  parallel: false
  container_image_base: copilot-eval
  copilot_version: "1.0.18"
  otel_endpoint: http://host.docker.internal:4318

variants:
  - name: baseline
    description: "Copilot CLI with Azure CLI (no plugins)"
    build: { script: examples/azure-skills/scripts/build-baseline.sh }
    run: { script: examples/azure-skills/scripts/azure-login.sh }

  - name: azure-skills
    description: "Copilot CLI with Azure Skills Plugin (microsoft/azure-skills)"
    build: { script: examples/azure-skills/scripts/build-azure-skills.sh }
    run: { script: examples/azure-skills/scripts/azure-login.sh }

tasks:
  - name: resource-explorer
    prompt: "List all resources in resource group {resource_group} and explain the architecture"
    hooks:
      before_run: scripts/reset-environment.sh
    evaluators:
      - name: verify
        type: script
        script: scripts/verify-resource-explorer.sh
      - name: completeness
        type: judge
        prompt: |
          Rate the completeness of this Azure resource listing on a scale of 1-10.
          10 = All resources listed with their types and relationships explained.
          1 = Major resources missing or only names without context.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: architecture_accuracy
        type: judge
        prompt: |
          Rate how accurately the architecture explanation captures the design patterns
          (e.g. VNet integration, private endpoints, monitoring setup) on a scale of 1-10.
          10 = All patterns correctly identified and explained.
          1 = Architecture description is wrong or missing.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: actionability
        type: judge
        prompt: |
          Rate how actionable and useful this output would be for an engineer unfamiliar
          with this Azure environment on a scale of 1-10.
          10 = Engineer could understand and work with this environment immediately.
          1 = Output is confusing or unhelpful.
          Output ONLY valid JSON: {"score": N, "reason": "..."}

  - name: app-deploy
    prompt: "I have a simple Node.js Express app in the current directory. Deploy it to the existing Azure App Service in resource group {resource_group}. The app service plan already exists."
    fixture: app-deploy
    hooks:
      before_run: scripts/reset-environment.sh
    evaluators:
      - name: verify
        type: script
        script: scripts/verify-app-deploy.sh
      - name: deployment_approach
        type: judge
        prompt: |
          Rate the quality of the deployment approach on a scale of 1-10.
          10 = Uses structured deployment workflow (prepare, validate, deploy).
          1 = Just suggests raw CLI commands without structure.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: completeness
        type: judge
        prompt: |
          Rate how complete the deployment steps are on a scale of 1-10.
          10 = Covers app creation, code deployment, config, and verification.
          1 = Only partial steps.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: verification
        type: judge
        prompt: |
          Rate whether the deployment process included verification steps on a scale of 1-10.
          10 = Verified the app is running after deployment (e.g., curl, browse, az webapp show).
          1 = Deployed without any post-deployment check.
          Output ONLY valid JSON: {"score": N, "reason": "..."}

  - name: diagnostics
    prompt: "There is an App Service in resource group {resource_group} that seems to be having issues. Find it, diagnose the application health, and check for any errors or warnings in the logs."
    hooks:
      before_run: scripts/prepare-diagnostics.sh
    evaluators:
      - name: verify
        type: script
        script: scripts/verify-diagnostics.sh
      - name: diagnostic_depth
        type: judge
        prompt: |
          Rate how deeply the diagnostics investigated the issue on a scale of 1-10.
          10 = Checked multiple data sources (App Insights, logs, metrics, configuration).
          1 = Only superficial checks or generic advice.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: root_cause
        type: judge
        prompt: |
          The App Service has two intentional issues:
          1. A wrong startup command ("node nonexistent-entry.js")
          2. The app code has a missing module dependency (require('./config'))
          Rate how accurately the root cause was identified on a scale of 1-10.
          10 = Both issues correctly identified with specific evidence.
          5 = One issue found or root cause partially identified.
          1 = Root cause not identified or completely wrong diagnosis.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: actionability
        type: judge
        prompt: |
          Rate how actionable the diagnostic findings are on a scale of 1-10.
          10 = Specific findings with clear remediation steps.
          1 = Vague observations without actionable next steps.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: tool_usage
        type: judge
        prompt: |
          Rate the breadth of Azure diagnostic tools and data sources used on a scale of 1-10.
          10 = Used multiple sources: az webapp log, App Insights queries, metrics, configuration checks.
          5 = Used 2-3 diagnostic approaches.
          1 = Only used a single command or made generic suggestions.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
